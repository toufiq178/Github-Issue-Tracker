<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- fonts connect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- tailwind css & daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">


</head>

<body class="geist-font">


    <main class=" max-w-11/12 mx-auto h-screen flex justify-center items-center ">

        <section >


            <fieldset class="fieldset bg-white shadow-md space-y-3 border-base-300 rounded-box w-sm md:w-md  p-7 border p-4">
                <div class="text-center space-y-5">
                    <img class="flex justify-self-center" src="./assets/github-logo.png" alt="">

                    <div class="space-y-2">
                        <h1 class="font-bold text-2xl sm:text-3xl ">GitHub Issues Tracker</h1>
                        <p class="label font-semibold text-xl ">Sign in to manage your issues</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="label text-black font-semibold">Username</label>
                    <input id="username-input" type="text" class="input w-full" placeholder="Enter Username" />

                    <label class="label text-black font-semibold">Password</label>
                    <input id="password-input" type="password" class="input w-full" placeholder="Enter Password" />
                </div>

                <button id="sign-in-btn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </section>
    </main>


    <!-- js connect -->
    <script src="./js/script.js"></script>

</body>

</html>
